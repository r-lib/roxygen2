url: https://roxygen2.r-lib.org

template:
  package: tidytemplate
  bootstrap: 5

  includes:
    in_header: |
      <script src="https://cdn.jsdelivr.net/gh/posit-dev/supported-by-posit/js/badge.min.js" data-max-height="43" data-light-bg="#666f76" data-light-fg="#f9f9f9"></script>
      <script defer data-domain="roxygen2.r-lib.org,all.tidyverse.org" src="https://plausible.io/js/plausible.js"></script>

development:
  mode: auto

home:
  links:
  - text: Learn more
    href: https://r-pkgs.org/man.html

reference:
- title: Tags
  contents:
  - starts_with("tags")

- title: Running roxygen2
  contents:
  - roxygenize
  - load

- title: Roclets
  desc: >
    A roclet is roxygen2's plugin system for processing documentation comments. 
    Each roclet handles a different type of output.
  contents:
  - ends_with("roclet")
  - update_collate

- title: Developing/extending roxygen2
  contents:
  - has_concept("extending")

articles:
- title: Documentation
  navbar: Documentation
  contents:
  - rd
  - rd-other
  - reuse
  - index-crossref
  - rd-formatting

- title: NAMESPACE
  navbar: NAMESPACE
  contents:
  - namespace

- title: Developer resources
  navbar: Developer
  contents:
  - extending

news:
  releases:
  - text: "Version 7.3.0"
    href: https://www.tidyverse.org/blog/2024/01/roxygen2-7-3-0/
  - text: "Version 7.2.0"
    href: https://www.tidyverse.org/blog/2022/05/roxygen2-7-2-0/
  - text: "Version 7.1.0"
    href: https://www.tidyverse.org/blog/2020/03/roxygen2-7-1-0/
  - text: "Version 7.0.0"
    href: https://www.tidyverse.org/blog/2019/11/roxygen2-7-0-0/
  - text: "Version 6.0.0"
    href: https://blog.rstudio.com/2017/02/01/roxygen2-6-0-0/
  - text: "Version 5.0.0"
    href: https://blog.rstudio.com/2015/10/29/roxygen2-5-0-0/
  - text: "Version 4.0.1"
    href: https://blog.rstudio.com/2014/05/19/roxygen2-4-0-1/
  - text: "Version 3.0.0"
    href: https://blog.rstudio.com/2013/12/09/roxygen2-3-0-0/
